apiVersion: apps/v1
kind: Deployment
metadata:
  name: grubhub-partner-api
  labels:
    app: grubhub-partner-api
    team: grubhub
spec:
  replicas: 2
  selector:
    matchLabels:
      app: grubhub-partner-api
  template:
    metadata:
      labels:
        app: grubhub-partner-api
        team: grubhub
    spec:
      containers:
        - name: grubhub-partner-api
          # Replace this placeholder image with one built from this repository.
          image: ghcr.io/your-org/grubhub-v12-demo:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: grubhub-partner-api
                  key: api-key
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: grubhub-partner-api
  labels:
    app: grubhub-partner-api
    team: grubhub
spec:
  type: ClusterIP
  selector:
    app: grubhub-partner-api
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
